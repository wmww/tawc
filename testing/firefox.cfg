// Firefox autoconfig overrides. Mandatory first line — Mozilla's
// autoconfig parser ignores it as a comment but refuses files
// without it.
//
// Loaded for every profile on every startup, via the companion
// /usr/lib/firefox/defaults/pref/autoconfig.js (see
// testing/firefox-autoconfig.js). `lockPref` keeps each setting
// stable even if a user toggles it in about:config and reopens
// Firefox.

// Force WebRender on and route its output through `zwp_linux_dmabuf_v1`
// so libhybris's `android_wlegl` can import each frame as an AHB.
// Without `widget.dmabuf.force-enabled` Firefox stays on a CPU
// readback that ends up committing `wl_shm` buffers (magenta-tinted
// in tawc's compositor, the bug that brought us here).
lockPref("gfx.webrender.all", true);
lockPref("gfx.webrender.compositor.force-enabled", true);
lockPref("widget.dmabuf.force-enabled", true);

// Run WebRender in the parent process. Mozilla normally fans
// rendering out to a dedicated GPU process; on proot the fork-server
// can't actually launch one, gfx detects the failure once and
// disables hardware acceleration for the rest of the session. With
// `layers.gpu-process.enabled=false` Firefox skips the hand-off and
// keeps WebRender + dmabuf in-parent, where libhybris's CFI patch
// already runs and the EGL surface is alive.
lockPref("layers.gpu-process.enabled", false);

// Disable VA-API hardware video decoding. ffmpeg's VA-API path
// dlopens `libva.so.2` against an X11/DRI driver Mesa stack; in our
// chroot that resolves to libhybris's libGL shims and the loader
// trips trying to find `libva-x11`. Decode is software-only here
// either way, so this just avoids the noise on Firefox startup.
lockPref("media.ffmpeg.vaapi.enabled", false);
