# nginx config for the dev-time mirror caching reverse proxy.
# Run via: bash scripts/cache-proxy.sh
# See notes/cache-proxy.md for design.

worker_processes 1;
# pid + log paths are relative to the prefix passed via `nginx -p`.
pid logs/nginx.pid;
error_log logs/error.log warn;

events { worker_connections 256; }

http {
  access_log logs/access.log;

  # proxy_pass uses a variable in the URL, so DNS happens at request
  # time and needs an explicit resolver. Cloudflare; v4-only because
  # most distro mirrors don't bother with v6 and ipv6 stalls add up.
  resolver 1.1.1.1 ipv6=off;

  # Cache all upstream responses for a year; key off the upstream URL
  # without query string so signed redirect tokens collapse onto one
  # cached blob (GitHub release downloads → objects.githubusercontent.com
  # with X-Amz-Signature query). 50 GB ceiling is plenty for a Manjaro +
  # Void + Arch install loop.
  proxy_cache_path cache/ keys_zone=m:50m max_size=50g inactive=365d;

  # Default temp paths land under the prefix dir.
  client_body_temp_path tmp/client_body;
  proxy_temp_path tmp/proxy;
  fastcgi_temp_path tmp/fastcgi;
  uwsgi_temp_path tmp/uwsgi;
  scgi_temp_path tmp/scgi;

  server {
    listen 127.0.0.1:8080;

    location ~ ^/proxy/(https?)/([^/]+)/(.*)$ {
      proxy_pass        $1://$2/$3$is_args$args;
      proxy_set_header  Host $2;
      proxy_set_header  User-Agent "tawc-cache-proxy";
      # Some upstreams (GitHub, Fastly) gzip text by default; we want
      # the wire bytes unchanged so the cache hit is byte-identical
      # across clients with different Accept-Encoding.
      proxy_set_header  Accept-Encoding "";

      # GitHub release-redirect headers are bigger than the 4 KiB
      # default and overflow the buffer otherwise.
      proxy_buffer_size       16k;
      proxy_buffers           8 16k;
      proxy_busy_buffers_size 32k;

      proxy_cache       m;
      proxy_cache_key   "$1://$2/$3";
      # Cache 200 (full) and 206 (range) for a year. 30x deliberately
      # not cached — release-asset redirects carry signed tokens that
      # change per request and the 30x is cheap to re-fetch anyway.
      proxy_cache_valid 200 206 365d;
      proxy_cache_lock  on;

      # Rewrite Location headers from upstream so 30x redirects
      # bounce back through the proxy (otherwise the client follows
      # straight to the redirect target and bypasses the cache —
      # which is exactly what GitHub release downloads do via
      # objects.githubusercontent.com).
      proxy_redirect ~^(https?)://([^/]+)/(.*)$ /proxy/$1/$2/$3;

      # Don't intercept upstream errors — let the client see the real
      # status so it can fail loudly instead of getting a generic 502.
      proxy_intercept_errors off;
    }
  }
}
